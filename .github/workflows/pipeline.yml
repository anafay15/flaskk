on:
 push:
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v2

      - name: Build Docker Image

        run: docker build -t flaskk .

      - name: Run Docker Container
        run: docker run -d -p 8080:8080 --name flaskkk flaskk
      - name: Test health endpoint
        run: |
         for i in $(seq 1 10); do
         curl -s http://localhost:8080/health && echo "App is up" && exit 0
         echo "Attempt $i failed, retrying in 5 seconds..."
         sleep 5
         done
         echo "App failed to start" && exit 1
      - name: Shutdown Container
        run: docker stop flaskkk

    deploy:
      runs-on: ubuntu-latest
      needs: build
      steps:
      - uses: actions/checkout@v2 
      - name: Deploy to Server
        run: |
         echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
            